# =====================================================================
# Smart City Navigation Platform - application.properties
# =====================================================================

spring.application.name=smart-city-navigation-backend

# --- MySQL Datasource ---
# Individual MYSQLHOST/MYSQLPORT/etc vars are auto-injected by Railway when you
# link a MySQL service to this app - locally they're unset, so it falls back
# to the same localhost values as before. No local setup changes needed.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:smart_city_navigation}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Server ---
# Railway (and most PaaS hosts) inject PORT at runtime; 8080 remains the local default.
server.port=${PORT:8080}

# --- JWT (local-dev default shown; override with a JWT_SECRET env var in production) ---
app.jwt.secret=${JWT_SECRET:xQ7mP2vL9nR4tY8wZ1cB5jF3hK6sD0aG9eU4iN7oM2qW5rT8yX1zC6bV3lH0kJ9p}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# --- CORS ---
# Comma-separated. Add your deployed frontend URL via a CORS_ALLOWED_ORIGINS env var
# in production, e.g. https://your-app.vercel.app - localhost keeps working for local dev.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
